windows:
  links:
    ftplugin: ~\AppData\Local\nvim\ftplugin
    lsp: ~\AppData\Local\nvim\lsp
    lua: ~\AppData\Local\nvim\lua
    plugin: ~\AppData\Local\nvim\plugin
    .stylua.toml: ~\AppData\Local\nvim\.stylua.toml
    init.lua: ~\AppData\Local\nvim\init.lua
    nvim-pack-lock.json: ~\AppData\Local\nvim\nvim-pack-lock.json

  depends:
    - ../terminal/pwsh
    - ../tools/git
    - ../tools/fzf
    - ../tools/fd

  installs: winget install --silent --no-upgrade Neovim.Neovim
